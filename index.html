<style>
  :root{
    --bg:#15110D;
    --red:#D72638;
    --gold:#F4A300;
    --cream:#FFF6E0;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    overflow:hidden;
    overscroll-behavior:none;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    min-height:100vh;
    font-family:'Poppins', sans-serif;
    touch-action:manipulation;
  }

  /* --- гирлянда флажков (сигнатурный элемент) --- */
  .bunting{
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 5vw;
    flex-shrink:0;
  }
  .bunting span{
    width:0;
    height:0;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:18px solid var(--red);
    opacity:0;
    transform:translateY(-8px);
    animation:drop .4s ease forwards;
  }
  .bunting span:nth-child(even){ border-top-color:var(--gold); }
  .bunting span:nth-child(1){ animation-delay:.02s; }
  .bunting span:nth-child(2){ animation-delay:.06s; }
  .bunting span:nth-child(3){ animation-delay:.10s; }
  .bunting span:nth-child(4){ animation-delay:.14s; }
  .bunting span:nth-child(5){ animation-delay:.18s; }
  .bunting span:nth-child(6){ animation-delay:.22s; }
  .bunting span:nth-child(7){ animation-delay:.26s; }
  .bunting span:nth-child(8){ animation-delay:.30s; }
  .bunting span:nth-child(9){ animation-delay:.34s; }
  .bunting span:nth-child(10){ animation-delay:.38s; }
  .bunting span:nth-child(11){ animation-delay:.42s; }

  @keyframes drop{ to{ opacity:1; transform:translateY(0); } }

  /* --- рамка с фото --- */
  .stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:4vh 8vw;
  }

  .photo-frame{
    width:min(78vw, 320px);
    aspect-ratio:1/1;
    background:var(--bg);
    border:6px solid var(--gold);
    border-radius:18px;
    box-shadow:
      0 0 0 3px var(--bg),
      0 0 0 6px var(--red),
      0 18px 40px rgba(0,0,0,.45);
    transform:rotate(-2deg);
    overflow:hidden;
    position:relative;
    opacity:0;
    animation:rise .5s .3s ease forwards;
  }

  @keyframes rise{ from{ opacity:0; transform:translateY(16px) rotate(-2deg); } to{ opacity:1; transform:translateY(0) rotate(-2deg); } }

  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* --- кнопка --- */
  .footer{
    width:100%;
    display:flex;
    justify-content:center;
    padding:0 6vw 5vh;
    flex-shrink:0;
  }

  .cta{
    width:100%;
    max-width:360px;
    padding:18px 22px;
    border:none;
    border-radius:16px;
    background:linear-gradient(180deg, var(--red), #B01B2A);
    color:var(--cream);
    font-family:'Luckiest Guy', cursive;
    font-size:clamp(18px, 5.4vw, 24px);
    letter-spacing:.5px;
    text-transform:uppercase;
    border-bottom:6px solid #7A0F19;
    box-shadow:0 10px 0 0 rgba(0,0,0,.25);
    cursor:pointer;
    opacity:0;
    animation:rise .5s .5s ease forwards;
    transition:transform .08s ease, border-bottom-width .08s ease, box-shadow .08s ease;
  }

  .cta:active{
    transform:translateY(6px);
    border-bottom-width:0;
    box-shadow:0 0 0 0 rgba(0,0,0,.25);
  }
</style>
</head>
